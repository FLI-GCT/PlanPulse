services:
  postgres:
    image: postgres:16-alpine
    container_name: planpulse-postgres
    environment:
      POSTGRES_DB: planpulse
      POSTGRES_USER: planpulse
      POSTGRES_PASSWORD: planpulse_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planpulse"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: planpulse-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: planpulse-ai
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
